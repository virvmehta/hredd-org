<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>hredd.org — Subscribe</title>
  <meta name="viewport" content="width=1366" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles/tokens.css" />

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <style>
    .page { max-width: 1366px; margin: 0 auto; padding: 0 var(--pad-x); }

    /* shared chrome */
    .topstrip { display: flex; justify-content: space-between; align-items: center; font-family: var(--sans); font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--ink-3); padding: 12px 0 10px; border-bottom: 1px solid var(--rule); }
    .topstrip .vol { color: var(--ink-2); }
    .topstrip .right { display: flex; gap: 22px; }
    .topstrip .right a:hover { color: var(--accent); }
    .nav { display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; gap: 36px; padding: 22px 0; border-bottom: 2px solid var(--ink); }
    .nav-left { display: flex; gap: 26px; flex-wrap: nowrap; white-space: nowrap; font-family: var(--sans); font-size: 12px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--ink-2); }
    .nav-left a { padding-bottom: 2px; border-bottom: 1px solid transparent; }
    .nav-left a:hover, .nav-left a.active { color: var(--accent); border-color: var(--accent); }
    .nav-center { text-align: center; font-family: var(--serif); font-size: 36px; line-height: 1; letter-spacing: 0.01em; white-space: nowrap; }
    .nav-center .glyph { display: inline-block; transform: translateY(-2px); margin: 0 6px; color: var(--accent); font-style: italic; font-size: 30px; }
    .nav-right { display: flex; gap: 26px; flex-wrap: nowrap; white-space: nowrap; justify-content: flex-end; font-family: var(--sans); font-size: 12px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--ink-2); }
    .nav-right a { padding-bottom: 2px; border-bottom: 1px solid transparent; }
    .nav-right a:hover, .nav-right a.active { color: var(--accent); border-color: var(--accent); }

    /* hero — single column, centered, big */
    .hero { padding: 96px 0 80px; max-width: 820px; margin: 0 auto; text-align: center; border-bottom: 1px solid var(--ink); }
    .hero .eyebrow { margin-bottom: 28px; }
    .hero h1 {
      font-family: var(--serif); font-weight: 400;
      font-size: 76px; line-height: 1.02; letter-spacing: -0.014em;
      margin: 0 0 26px; text-wrap: balance;
    }
    .hero h1 em { font-style: italic; color: var(--accent); }
    .hero .lede {
      font-family: var(--serif); font-size: 22px; line-height: 1.5;
      color: var(--ink-2); max-width: 640px; margin: 0 auto 44px;
      text-wrap: pretty;
    }

    /* email form — hairline ledger */
    .hero .form {
      display: grid; grid-template-columns: 1fr auto;
      max-width: 640px; margin: 0 auto;
      border-top: 2px solid var(--ink);
      border-bottom: 2px solid var(--ink);
    }
    .hero .form input {
      background: transparent; border: 0; outline: none;
      font-family: var(--serif); font-size: 24px;
      padding: 22px 4px; color: var(--ink); text-align: left;
    }
    .hero .form input::placeholder { color: var(--ink-3); font-style: italic; }
    .hero .form button {
      background: transparent; border: 0; border-left: 1px solid var(--ink);
      font-family: var(--sans); font-size: 12px;
      letter-spacing: 0.2em; text-transform: uppercase;
      padding: 0 32px; cursor: pointer; color: var(--accent);
    }
    .hero .form button:hover { background: var(--ink); color: var(--bg); }

    .hero .micro {
      font-family: var(--sans); font-size: 11.5px; color: var(--ink-3);
      letter-spacing: 0.04em; margin-top: 16px;
      max-width: 460px; margin-inline: auto; line-height: 1.5;
    }

    .hero .meta-row {
      display: grid; grid-template-columns: 1fr 1fr 1fr;
      gap: 0; margin-top: 64px;
      border-top: 1px solid var(--rule);
      border-bottom: 1px solid var(--rule);
    }
    .hero .meta-row .cell {
      padding: 24px 16px;
      border-right: 1px solid var(--rule);
    }
    .hero .meta-row .cell:last-child { border-right: 0; }
    .hero .meta-row .num {
      font-family: var(--serif); font-size: 30px; line-height: 1;
      color: var(--ink); margin-bottom: 8px;
    }
    .hero .meta-row .lbl {
      font-family: var(--sans); font-size: 10.5px;
      letter-spacing: 0.14em; text-transform: uppercase;
      color: var(--ink-3);
    }

    /* sample issue */
    .sample {
      padding: 72px 0;
      max-width: 720px; margin: 0 auto;
      text-align: center;
      border-bottom: 2px solid var(--ink);
    }
    .sample .label {
      font-family: var(--sans); font-size: 10.5px;
      letter-spacing: 0.22em; text-transform: uppercase;
      color: var(--accent); margin-bottom: 18px;
    }
    .sample h3 {
      font-family: var(--serif); font-weight: 400;
      font-size: 36px; line-height: 1.18;
      margin: 0 0 14px; letter-spacing: -0.005em;
      text-wrap: balance;
    }
    .sample .byline {
      font-family: var(--sans); font-size: 11.5px;
      letter-spacing: 0.12em; text-transform: uppercase;
      color: var(--ink-3); margin: 0 0 28px;
    }
    .sample .excerpt {
      font-family: var(--serif); font-style: italic;
      font-size: 19px; line-height: 1.55;
      color: var(--ink-2); margin: 0 0 28px;
      text-wrap: pretty;
    }
    .sample .link {
      font-family: var(--sans); font-size: 11.5px;
      letter-spacing: 0.16em; text-transform: uppercase;
      color: var(--accent);
      border-bottom: 1px solid var(--accent);
      padding-bottom: 2px;
    }
    .sample .link:hover { color: var(--accent-ink); border-color: var(--accent-ink); }

    /* footer */
    footer {
      padding: 48px 0; font-family: var(--sans);
      font-size: 12px; color: var(--ink-3);
      display: flex; justify-content: space-between;
    }
    footer a:hover { color: var(--accent); }
    footer .links { display: flex; gap: 28px; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" src="src/Subscribe.jsx"></script>
</body>
</html>
