<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>HREDD — The Tracker</title>
  <meta name="viewport" content="width=1366" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles/tokens.css" />

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/d3@7.9.0/dist/d3.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/topojson-client@3.1.0/dist/topojson-client.min.js"></script>

  <style>
    .page { max-width: 1366px; margin: 0 auto; padding: 0 var(--pad-x); }

    /* shared with homepage — copied so this file is self-contained */
    .topstrip {
      display: flex; justify-content: space-between; align-items: center;
      font-family: var(--sans); font-size: 11px; letter-spacing: 0.12em;
      text-transform: uppercase; color: var(--ink-3);
      padding: 12px 0 10px; border-bottom: 1px solid var(--rule);
    }
    .topstrip .vol { color: var(--ink-2); }
    .topstrip .right { display: flex; gap: 22px; }
    .topstrip .right a:hover { color: var(--accent); }

    .nav {
      display: grid; grid-template-columns: 1fr auto 1fr;
      align-items: center; padding: 22px 0;
      border-bottom: 2px solid var(--ink);
    }
    .nav-left { display: flex; gap: 26px; flex-wrap: nowrap; white-space: nowrap; font-family: var(--sans); font-size: 12px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--ink-2); }
    .nav-left a { padding-bottom: 2px; border-bottom: 1px solid transparent; }
    .nav-left a:hover, .nav-left a.active { color: var(--accent); border-color: var(--accent); }
    .nav-center { text-align: center; font-family: var(--serif); font-size: 36px; line-height: 1; letter-spacing: 0.01em; white-space: nowrap; }
    .nav-center .glyph {
      display: inline-block; transform: translateY(-2px); margin: 0 6px;
      color: var(--accent); font-style: italic; font-size: 30px;
    }
    .nav-right {
      display: flex; gap: 26px; justify-content: flex-end;
      font-family: var(--sans); font-size: 12px; letter-spacing: 0.16em;
      text-transform: uppercase; color: var(--ink-2);
    }
    .nav-right a { padding-bottom: 2px; border-bottom: 1px solid transparent; }
    .nav-right a:hover, .nav-right a.active {
      color: var(--accent); border-color: var(--accent);
    }

    /* ---------- page header ---------- */
    .pgh {
      display: grid;
      grid-template-columns: minmax(0, 1.8fr) 1px minmax(0, 1fr);
      gap: 56px 88px;
      padding: 56px 0 40px;
      border-bottom: 1px solid var(--ink);
    }
    .pgh .v { background: var(--rule); width: 1px; }
    .pgh .eyebrow { margin-bottom: 14px; }
    .pgh h1 {
      font-family: var(--serif); font-weight: 400;
      font-size: 68px; line-height: 1.0; letter-spacing: -0.012em;
      margin: 0 0 22px;
      text-wrap: balance;
    }
    .pgh h1 em { color: var(--accent); }
    .pgh .lede {
      font-family: var(--serif); font-size: 21px; line-height: 1.45;
      color: var(--ink-2); max-width: 620px; text-wrap: pretty;
    }
    .pgh .stats {
      display: grid; grid-template-columns: repeat(2, 1fr);
      column-gap: 32px; row-gap: 0;
    }
    .pgh .stats .label {
      font-family: var(--sans); font-size: 10.5px;
      letter-spacing: 0.22em; text-transform: uppercase;
      color: var(--accent); margin-bottom: 14px;
      grid-column: 1 / -1;
    }
    .pgh .stats .row {
      display: flex; align-items: baseline; justify-content: space-between;
      gap: 12px; padding: 12px 0;
      border-top: 1px solid var(--rule);
    }
    .pgh .stats .row .n {
      font-family: var(--serif); font-size: 30px; line-height: 1;
    }
    .pgh .stats .row .k {
      font-family: var(--sans); font-size: 11.5px;
      color: var(--ink-2); letter-spacing: 0.04em; text-align: right;
      max-width: 110px;
    }

    /* ---------- date banner ---------- */
    .banner {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      padding: 18px 0;
      border-bottom: 1px solid var(--ink);
      font-family: var(--sans);
      font-size: 11.5px;
      letter-spacing: 0.20em;
      text-transform: uppercase;
      color: var(--accent);
      cursor: pointer;
    }
    .banner:hover { color: var(--accent-ink); }
    .banner .right { display: flex; gap: 22px; align-items: center; color: var(--ink-3); }
    .banner .right .arrow { color: var(--accent); }

    /* ---------- map area ---------- */
    .map-wrap {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 1px 320px;
      gap: 40px;
      padding: 32px 0 40px;
      border-bottom: 1px solid var(--ink);
    }
    .map-wrap .v { background: var(--rule); width: 1px; }
    .map-canvas {
      position: relative;
      background: var(--bg);
      border: 1px solid var(--rule);
      aspect-ratio: 16 / 9;
    }
    .map-canvas svg {
      width: 100%; height: 100%;
      display: block;
    }
    .map-canvas .overlay {
      position: absolute; left: 14px; top: 14px;
      display: flex; flex-direction: column; gap: 6px;
      font-family: var(--mono); font-size: 11px; color: var(--ink-3);
      pointer-events: none;
    }
    .map-canvas .overlay .row {
      display: flex; align-items: center; gap: 8px;
    }
    .map-canvas .overlay .swatch {
      width: 14px; height: 8px; display: inline-block;
    }
    .map-canvas .scale {
      position: absolute; right: 14px; bottom: 14px;
      font-family: var(--mono); font-size: 10.5px;
      color: var(--ink-3); letter-spacing: 0.05em;
      pointer-events: none;
    }
    .map-canvas .grat path {
      fill: none; stroke: var(--rule); stroke-width: 0.4;
      opacity: 0.55;
    }
    .map-canvas .country {
      fill: var(--light-fill);
      stroke: var(--bg);
      stroke-width: 0.5;
      transition: fill 120ms ease;
      cursor: default;
    }
    .map-canvas .country.has-law {
      fill: var(--dark-fill);
      cursor: pointer;
    }
    .map-canvas .country.has-law:hover,
    .map-canvas .country.has-law.selected {
      fill: var(--accent);
    }

    /* side panel */
    .panel .label {
      font-family: var(--sans); font-size: 10.5px;
      letter-spacing: 0.22em; text-transform: uppercase;
      color: var(--accent); margin-bottom: 16px;
    }
    .panel .country-name {
      font-family: var(--serif); font-size: 36px;
      line-height: 1.05; letter-spacing: -0.005em; margin: 0 0 6px;
    }
    .panel .meta-line {
      font-family: var(--sans); font-size: 11.5px;
      letter-spacing: 0.06em; color: var(--ink-3);
      margin-bottom: 22px;
    }
    .panel .law {
      padding: 16px 0; border-top: 1px solid var(--rule); cursor: pointer;
    }
    .panel .law:last-child { border-bottom: 1px solid var(--rule); }
    .panel .law:hover .ttl { color: var(--accent-ink); }
    .panel .law .yr {
      font-family: var(--mono); font-size: 11px; color: var(--ink-3);
    }
    .panel .law .ttl {
      font-family: var(--serif); font-size: 19px; line-height: 1.2;
      margin: 4px 0 6px; text-wrap: balance;
    }
    .panel .law .st {
      font-family: var(--sans); font-size: 10.5px;
      letter-spacing: 0.16em; text-transform: uppercase;
    }
    .panel .law .st.in-force { color: var(--accent); }
    .panel .law .st.pending  { color: var(--ink-2); }
    .panel .law .st.proposed { color: var(--ink-3); }
    .panel .empty {
      font-family: var(--serif); font-style: italic;
      font-size: 18px; color: var(--ink-3); line-height: 1.45;
    }
    .panel .empty .hint {
      display: block; margin-top: 12px;
      font-family: var(--sans); font-style: normal; font-size: 11px;
      letter-spacing: 0.18em; text-transform: uppercase; color: var(--ink-3);
    }

    /* ---------- table ---------- */
    .ledger-head {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: baseline;
      padding: 36px 0 18px;
    }
    .ledger-head h2 {
      font-family: var(--serif); font-weight: 400;
      font-size: 32px; margin: 0; letter-spacing: 0.005em;
    }
    .ledger-head h2 em { color: var(--accent); }
    .ledger-head .filters {
      display: flex; gap: 20px; align-items: center;
      font-family: var(--sans); font-size: 11px;
      letter-spacing: 0.16em; text-transform: uppercase; color: var(--ink-3);
    }
    .ledger-head .filters .pill {
      padding: 4px 10px; border: 1px solid var(--rule); cursor: pointer;
    }
    .ledger-head .filters .pill.active {
      color: var(--accent); border-color: var(--accent);
    }

    .ledger {
      width: 100%;
      border-collapse: collapse;
      border-top: 1px solid var(--ink);
      border-bottom: 1px solid var(--ink);
    }
    .ledger thead th {
      text-align: left;
      font-family: var(--sans); font-size: 10.5px;
      letter-spacing: 0.20em; text-transform: uppercase;
      color: var(--ink-3); font-weight: 500;
      padding: 14px 16px;
      border-bottom: 1px solid var(--ink);
    }
    .ledger tbody td {
      padding: 18px 16px;
      border-bottom: 1px solid var(--rule);
      vertical-align: baseline;
    }
    .ledger tbody tr { cursor: pointer; }
    .ledger tbody tr:hover td.name { color: var(--accent-ink); }
    .ledger td.num {
      font-family: var(--mono); font-size: 12px; color: var(--ink-3);
      width: 50px;
    }
    .ledger td.name {
      font-family: var(--serif); font-size: 20px; line-height: 1.2;
    }
    .ledger td.juris {
      font-family: var(--sans); font-size: 11.5px;
      letter-spacing: 0.10em; text-transform: uppercase; color: var(--ink-2);
      width: 180px;
    }
    .ledger td.year {
      font-family: var(--mono); font-size: 13px; color: var(--ink-2);
      width: 80px;
    }
    .ledger td.scope {
      font-family: var(--serif); font-size: 15px;
      color: var(--ink-2); font-style: italic; width: 280px;
    }
    .ledger td.status {
      font-family: var(--sans); font-size: 10.5px;
      letter-spacing: 0.16em; text-transform: uppercase;
      width: 130px; text-align: right; padding-right: 0;
    }
    .ledger td.status.in-force { color: var(--accent); }
    .ledger td.status.pending  { color: var(--ink-2); }
    .ledger td.status.proposed { color: var(--ink-3); }

    /* ---------- footer (compact) ---------- */
    footer {
      padding: 48px 0; font-family: var(--sans);
      font-size: 12px; color: var(--ink-3);
      display: flex; justify-content: space-between;
      border-top: 2px solid var(--ink);
      margin-top: 56px;
    }
    footer a:hover { color: var(--accent); }
    footer .links { display: flex; gap: 28px; }

  </style>
</head>
