<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>HREDD — Homepage</title>
  <meta name="viewport" content="width=1366" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles/tokens.css" />

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <style>
    /* ---------- page-specific ---------- */
    .page {
      max-width: 1366px;
      margin: 0 auto;
      padding: 0 var(--pad-x);
    }

    /* ---------- top utility strip ---------- */
    .topstrip {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-family: var(--sans);
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--ink-3);
      padding: 12px 0 10px;
      border-bottom: 1px solid var(--rule);
    }
    .topstrip .vol { color: var(--ink-2); }
    .topstrip .right { display: flex; gap: 22px; }
    .topstrip .right a:hover { color: var(--accent); }

    /* ---------- masthead nav ---------- */
    .nav {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      padding: 22px 0 22px;
      border-bottom: 2px solid var(--ink);
    }
    .nav-left {
      display: flex;
      flex-direction: row;
      flex-wrap: nowrap;
      white-space: nowrap;
      gap: 26px;
      font-family: var(--sans);
      font-size: 12px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--ink-2);
    }
    .nav-left a { padding-bottom: 2px; border-bottom: 1px solid transparent; }
    .nav-left a:hover, .nav-left a.active { color: var(--accent); border-color: var(--accent); }
    .nav-center { text-align: center; font-family: var(--serif); font-size: 36px; line-height: 1; letter-spacing: 0.01em; white-space: nowrap; }
    .nav-center .glyph {
      display: inline-block;
      transform: translateY(-2px);
      margin: 0 6px;
      color: var(--accent);
      font-style: italic;
      font-size: 30px;
    }
    .nav-center .sub {
      display: block;
      margin-top: 8px;
      font-family: var(--sans);
      font-style: normal;
      font-size: 10.5px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--ink-3);
    }
    .nav-right {
      display: flex;
      gap: 26px;
      flex-wrap: nowrap;
      white-space: nowrap;
      justify-content: flex-end;
      font-family: var(--sans);
      font-size: 12px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--ink-2);
    }
    .nav-right a { padding-bottom: 2px; border-bottom: 1px solid transparent; }
    .nav-right a:hover { color: var(--accent); border-color: var(--accent); }

    /* ---------- masthead ---------- */
    .masthead {
      display: grid;
      grid-template-columns: minmax(0, 1.8fr) 1px minmax(0, 1fr);
      gap: 56px 88px;
      padding: 64px 0 56px;
      border-bottom: 1px solid var(--ink);
    }
    .masthead .divider {
      background: var(--rule);
      width: 1px;
    }
    .masthead h1 {
      font-family: var(--serif);
      font-weight: 400;
      font-size: 96px;
      line-height: 0.96;
      letter-spacing: -0.014em;
      margin: 0 0 28px;
      color: var(--ink);
      white-space: nowrap;
    }
    .masthead h1 .l2 { font-style: italic; display: block; }
    .masthead h1 .l3 { display: block; }

    .masthead .lede {
      font-family: var(--serif);
      font-size: 22px;
      line-height: 1.4;
      color: var(--ink-2);
      max-width: 580px;
      margin-bottom: 28px;
      text-wrap: pretty;
    }
    .masthead .stamp {
      font-family: var(--sans);
      font-size: 11px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--ink-3);
      display: flex;
      gap: 14px;
      align-items: center;
    }
    .masthead .stamp .dot {
      width: 4px; height: 4px; background: var(--accent); display: inline-block;
    }

    /* this-month box */
    .thismonth { padding-top: 6px; }
    .thismonth .label {
      font-family: var(--sans);
      font-size: 10.5px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 22px;
    }
    .thismonth .row {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 16px;
      padding: 14px 0;
      border-top: 1px solid var(--rule);
    }
    .thismonth .row:last-child { border-bottom: 1px solid var(--rule); }
    .thismonth .row .n {
      font-family: var(--serif);
      font-size: 36px;
      line-height: 1;
      color: var(--ink);
      font-feature-settings: "lnum" 1;
    }
    .thismonth .row .k {
      font-family: var(--sans);
      font-size: 12px;
      color: var(--ink-2);
      letter-spacing: 0.04em;
      text-align: right;
      max-width: 160px;
    }
    .thismonth .foot {
      margin-top: 18px;
      font-family: var(--sans);
      font-size: 11px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--accent);
      cursor: pointer;
    }
    .thismonth .foot:hover { text-decoration: underline; text-underline-offset: 4px; }

    /* ---------- contents (latest) ---------- */
    .contents-head {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      padding: 36px 0 22px;
    }
    .contents-head h2 {
      font-family: var(--serif);
      font-weight: 400;
      font-size: 32px;
      letter-spacing: 0.01em;
      margin: 0;
    }
    .contents-head h2 em { color: var(--accent); }
    .contents-head .right {
      font-family: var(--sans);
      font-size: 11px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--ink-3);
    }
    .contents-head .right a { color: var(--accent); }
    .contents-head .right a:hover { text-decoration: underline; text-underline-offset: 4px; }

    /* lead + secondaries */
    .lead-grid {
      display: grid;
      grid-template-columns: minmax(0, 1.45fr) 1px minmax(0, 1fr);
      gap: 56px;
      border-top: 1px solid var(--ink);
      padding-top: 36px;
    }
    .lead-grid .v { background: var(--rule); width: 1px; }

    .lead .figure {
      width: 100%;
      aspect-ratio: 16 / 10;
      background:
        repeating-linear-gradient(135deg,
          var(--rule-soft) 0 2px,
          transparent 2px 14px),
        var(--bg-warm);
      border: 1px solid var(--rule);
      display: flex;
      align-items: flex-end;
      justify-content: flex-start;
      padding: 14px;
    }
    .lead .figure .cap {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--ink-3);
      background: var(--bg);
      padding: 4px 8px;
      border: 1px solid var(--rule);
    }
    .lead .eyebrow { margin-top: 22px; }
    .lead h3 {
      font-family: var(--serif);
      font-weight: 400;
      font-size: 44px;
      line-height: 1.05;
      letter-spacing: -0.005em;
      margin: 12px 0 14px;
      text-wrap: balance;
    }
    .lead h3:hover { color: var(--accent-ink); cursor: pointer; }
    .lead .deck {
      font-family: var(--serif);
      font-style: italic;
      font-size: 20px;
      line-height: 1.45;
      color: var(--ink-2);
      max-width: 620px;
      margin-bottom: 18px;
      text-wrap: pretty;
    }
    .byline {
      font-family: var(--sans);
      font-size: 12px;
      letter-spacing: 0.04em;
      color: var(--ink-3);
      display: flex;
      gap: 14px;
      align-items: center;
    }
    .byline .author { color: var(--ink-2); }
    .byline .sep { color: var(--rule); }

    .secondaries {
      display: flex;
      flex-direction: column;
    }
    .sec {
      padding: 0 0 22px;
      margin-bottom: 22px;
      border-bottom: 1px solid var(--rule);
      cursor: pointer;
    }
    .sec:last-child { border-bottom: 0; margin-bottom: 0; padding-bottom: 0; }
    .sec h4 {
      font-family: var(--serif);
      font-weight: 400;
      font-size: 24px;
      line-height: 1.15;
      margin: 8px 0 8px;
      text-wrap: balance;
    }
    .sec:hover h4 { color: var(--accent-ink); }
    .sec .excerpt {
      font-family: var(--serif);
      font-size: 16px;
      line-height: 1.5;
      color: var(--ink-2);
      margin-bottom: 10px;
    }

    /* lower row of three */
    .three {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 32px;
      padding-top: 36px;
      margin-top: 36px;
      border-top: 1px solid var(--ink);
    }
    .three .col h4 {
      font-family: var(--serif);
      font-weight: 400;
      font-size: 22px;
      line-height: 1.18;
      margin: 10px 0 8px;
      text-wrap: balance;
    }
    .three .col:hover h4 { color: var(--accent-ink); cursor: pointer; }
    .three .col .excerpt {
      font-family: var(--serif);
      font-size: 15px;
      line-height: 1.5;
      color: var(--ink-2);
      margin-bottom: 10px;
    }

    /* ---------- tracker teaser ---------- */
    .tracker {
      margin-top: 88px;
      padding: 56px 0 64px;
      border-top: 2px solid var(--ink);
      border-bottom: 1px solid var(--ink);
    }
    .tracker-head {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: end;
      gap: 32px;
      margin-bottom: 28px;
    }
    .tracker-head h2 {
      font-family: var(--serif);
      font-weight: 400;
      font-size: 56px;
      line-height: 1;
      letter-spacing: -0.005em;
      margin: 8px 0 0;
    }
    .tracker-head h2 em { color: var(--accent); }
    .tracker-head .blurb {
      font-family: var(--serif);
      font-size: 18px;
      color: var(--ink-2);
      max-width: 380px;
      text-align: right;
      font-style: italic;
      line-height: 1.45;
    }
    .tracker-grid {
      display: grid;
      grid-template-columns: minmax(0, 1.3fr) 1px minmax(0, 1fr);
      gap: 48px;
    }
    .tracker-grid .v { background: var(--rule); width: 1px; }

    .law-row {
      display: grid;
      grid-template-columns: 36px minmax(0, 1fr) 130px 110px;
      gap: 28px;
      align-items: baseline;
      padding: 16px 0;
      border-bottom: 1px solid var(--rule);
      cursor: pointer;
    }
    .law-row:first-child { border-top: 1px solid var(--ink); }
    .law-row:hover .name { color: var(--accent-ink); }
    .law-row .num {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--ink-3);
    }
    .law-row .name {
      font-family: var(--serif);
      font-size: 19px;
      line-height: 1.22;
      color: var(--ink);
      min-width: 0;
      overflow-wrap: anywhere;
    }
    .law-row .juris {
      font-family: var(--sans);
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--ink-2);
      min-width: 0;
    }
    .law-row .status {
      font-family: var(--sans);
      font-size: 10.5px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      text-align: right;
    }
    .status.in-force { color: var(--accent); }
    .status.pending  { color: var(--ink-2); }
    .status.proposed { color: var(--ink-3); }

    .tracker-side .label {
      font-family: var(--sans);
      font-size: 10.5px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 16px;
    }
    .tracker-side .pull {
      font-family: var(--serif);
      font-size: 30px;
      line-height: 1.18;
      letter-spacing: -0.005em;
      color: var(--ink);
      margin-bottom: 22px;
      text-wrap: balance;
    }
    .tracker-side .stat {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      padding: 12px 0;
      border-top: 1px solid var(--rule);
    }
    .tracker-side .stat:last-of-type { border-bottom: 1px solid var(--rule); }
    .tracker-side .stat .n {
      font-family: var(--serif);
      font-size: 30px;
    }
    .tracker-side .stat .k {
      font-family: var(--sans);
      font-size: 12px;
      color: var(--ink-2);
      letter-spacing: 0.04em;
    }
    .tracker-side .cta {
      margin-top: 26px;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-family: var(--sans);
      font-size: 12px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--accent);
      cursor: pointer;
    }
    .tracker-side .cta:hover { text-decoration: underline; text-underline-offset: 4px; }

    /* ---------- subscribe band ---------- */
    .subscribe {
      padding: 80px 0;
      border-bottom: 1px solid var(--ink);
    }
    .subscribe-grid {
      display: grid;
      grid-template-columns: minmax(0, 1.1fr) minmax(0, 1fr);
      gap: 56px;
      align-items: start;
    }
    .subscribe h2 {
      font-family: var(--serif);
      font-weight: 400;
      font-size: 56px;
      line-height: 1;
      letter-spacing: -0.005em;
      margin: 0 0 18px;
    }
    .subscribe h2 em { color: var(--accent); }
    .subscribe p {
      font-family: var(--serif);
      font-size: 19px;
      line-height: 1.45;
      color: var(--ink-2);
      max-width: 460px;
    }
    .form {
      padding-top: 8px;
    }
    .form .row {
      display: grid;
      grid-template-columns: 1fr auto;
      border-bottom: 1px solid var(--ink);
      padding: 14px 0 10px;
    }
    .form input {
      border: 0;
      background: transparent;
      font-family: var(--serif);
      font-size: 22px;
      color: var(--ink);
      outline: none;
    }
    .form input::placeholder { color: var(--ink-3); font-style: italic; }
    .form button {
      border: 0;
      background: transparent;
      font-family: var(--sans);
      font-size: 12px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--accent);
      cursor: pointer;
      padding: 0 4px;
    }
    .form button:hover { color: var(--accent-ink); }
    .form .promises {
      display: flex;
      gap: 28px;
      margin-top: 20px;
      font-family: var(--sans);
      font-size: 11px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--ink-3);
    }
    .form .promises .dot {
      width: 4px; height: 4px; background: var(--accent); display: inline-block;
      margin-right: 8px; transform: translateY(-2px);
    }

    /* ---------- footer ---------- */
    footer {
      padding: 48px 0 56px;
      font-family: var(--sans);
      font-size: 12px;
      color: var(--ink-3);
    }
    .foot-grid {
      display: grid;
      grid-template-columns: 1.4fr 1fr 1fr 1fr;
      gap: 48px;
      margin-bottom: 40px;
    }
    .foot-grid h5 {
      font-family: var(--sans);
      font-size: 10.5px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--accent);
      margin: 0 0 14px;
      font-weight: 500;
    }
    .foot-grid ul { list-style: none; padding: 0; margin: 0; }
    .foot-grid li { padding: 4px 0; color: var(--ink-2); cursor: pointer; }
    .foot-grid li:hover { color: var(--accent); }
    .foot-grid .about p {
      font-family: var(--serif);
      font-size: 15px;
      line-height: 1.5;
      color: var(--ink-2);
      margin: 0 0 14px;
    }
    .foot-grid .about .mast {
      font-family: var(--serif);
      font-size: 22px;
      line-height: 1;
      letter-spacing: 0.01em;
      color: var(--ink);
      margin-bottom: 14px;
    }
    .foot-grid .about .mast em { color: var(--accent); }
    .colophon {
      display: flex;
      justify-content: space-between;
      padding-top: 22px;
      border-top: 1px solid var(--rule);
      letter-spacing: 0.06em;
    }

    /* ---------- small flourishes ---------- */
    .ornament {
      display: inline-block;
      width: 18px;
      height: 1px;
      background: var(--ink);
      vertical-align: middle;
      margin: 0 8px 4px;
    }
  </style>
</head>
