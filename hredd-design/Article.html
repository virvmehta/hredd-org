<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>HREDD — When the Supply Chain Speaks Back</title>
  <meta name="viewport" content="width=1366" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles/tokens.css" />

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <style>
    .page { max-width: 1366px; margin: 0 auto; padding: 0 var(--pad-x); }

    /* shared chrome */
    .topstrip { display: flex; justify-content: space-between; align-items: center; font-family: var(--sans); font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--ink-3); padding: 12px 0 10px; border-bottom: 1px solid var(--rule); }
    .topstrip .vol { color: var(--ink-2); }
    .topstrip .right { display: flex; gap: 22px; }
    .topstrip .right a:hover { color: var(--accent); }
    .nav { display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; gap: 36px; padding: 22px 0; border-bottom: 2px solid var(--ink); }
    .nav-left { display: flex; gap: 26px; flex-wrap: nowrap; white-space: nowrap; font-family: var(--sans); font-size: 12px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--ink-2); }
    .nav-left a { padding-bottom: 2px; border-bottom: 1px solid transparent; }
    .nav-left a:hover, .nav-left a.active { color: var(--accent); border-color: var(--accent); }
    .nav-center { text-align: center; font-family: var(--serif); font-size: 36px; line-height: 1; letter-spacing: 0.01em; white-space: nowrap; }
    .nav-center .glyph { display: inline-block; transform: translateY(-2px); margin: 0 6px; color: var(--accent); font-style: italic; font-size: 30px; }
    .nav-right { display: flex; gap: 26px; justify-content: flex-end; flex-wrap: nowrap; white-space: nowrap; font-family: var(--sans); font-size: 12px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--ink-2); }
    .nav-right a { padding-bottom: 2px; border-bottom: 1px solid transparent; }
    .nav-right a:hover, .nav-right a.active { color: var(--accent); border-color: var(--accent); }

    .crumb { padding: 18px 0; border-bottom: 1px solid var(--rule); font-family: var(--sans); font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--ink-3); }
    .crumb a:hover { color: var(--accent); }
    .crumb .sep { color: var(--rule); padding: 0 10px; }

    /* article masthead — single column, centered, big */
    .art-mast { padding: 64px 0 48px; max-width: 980px; margin: 0 auto; text-align: center; border-bottom: 1px solid var(--ink); }
    .art-mast .eyebrow { margin-bottom: 22px; }
    .art-mast h1 { font-family: var(--serif); font-weight: 400; font-size: 64px; line-height: 1.04; letter-spacing: -0.012em; margin: 0 0 26px; text-wrap: balance; }
    .art-mast .deck { font-family: var(--serif); font-style: italic; font-size: 26px; line-height: 1.4; color: var(--ink-2); max-width: 800px; margin: 0 auto 32px; text-wrap: pretty; }
    .art-mast .byline { display: flex; justify-content: center; gap: 18px; align-items: center; font-family: var(--sans); font-size: 12px; letter-spacing: 0.06em; color: var(--ink-3); flex-wrap: wrap; }
    .art-mast .byline .author { color: var(--ink); font-weight: 500; }
    .art-mast .byline .sep { color: var(--rule); }

    /* hero figure */
    .art-figure { padding: 40px 0 0; }
    .art-figure .frame { width: 100%; aspect-ratio: 16 / 8; background: repeating-linear-gradient(135deg, var(--rule-soft) 0 2px, transparent 2px 14px), var(--bg-warm); border: 1px solid var(--rule); display: flex; align-items: flex-end; padding: 18px; }
    .art-figure .frame .cap { font-family: var(--mono); font-size: 11px; color: var(--ink-3); background: var(--bg); padding: 6px 10px; border: 1px solid var(--rule); }
    .art-figure .credit { font-family: var(--sans); font-size: 11px; color: var(--ink-3); letter-spacing: 0.06em; padding: 12px 0 0; max-width: 980px; margin: 0 auto; }

    /* body grid */
    .body-grid { display: grid; grid-template-columns: minmax(0, 1fr) 1px 300px; gap: 64px; padding: 56px 0 64px; }
    .body-grid .v { background: var(--rule); width: 1px; }

    .article { max-width: 720px; margin: 0 auto; }
    .article > p { font-family: var(--serif); font-size: 19px; line-height: 1.6; color: var(--ink); margin: 0 0 18px; text-align: justify; hyphens: auto; text-wrap: pretty; }
    .article > p:first-of-type::first-letter { font-family: var(--serif); float: left; font-size: 76px; line-height: 0.86; padding: 6px 12px 0 0; color: var(--accent); }
    .article h2 { font-family: var(--serif); font-weight: 400; font-size: 30px; line-height: 1.15; letter-spacing: -0.005em; margin: 48px 0 18px; text-wrap: balance; }
    .article h2 .num { font-family: var(--mono); font-size: 14px; color: var(--accent); letter-spacing: 0.1em; margin-right: 14px; }
    .article blockquote { margin: 36px 0; padding: 0 0 0 32px; border-left: 2px solid var(--accent); font-family: var(--serif); font-style: italic; font-size: 26px; line-height: 1.4; color: var(--ink); max-width: 600px; }
    .article blockquote cite { display: block; margin-top: 14px; font-family: var(--sans); font-style: normal; font-size: 11.5px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--ink-3); }

    /* inline figure */
    .inline-fig { margin: 36px 0; }
    .inline-fig .frame { width: 100%; aspect-ratio: 16 / 9; background: repeating-linear-gradient(135deg, var(--rule-soft) 0 2px, transparent 2px 14px), var(--bg-warm); border: 1px solid var(--rule); display: flex; align-items: flex-end; padding: 14px; }
    .inline-fig .frame .cap { font-family: var(--mono); font-size: 11px; color: var(--ink-3); background: var(--bg); padding: 4px 8px; border: 1px solid var(--rule); }
    .inline-fig .meta { font-family: var(--sans); font-size: 11px; color: var(--ink-3); letter-spacing: 0.04em; padding-top: 10px; }

    /* sidebar */
    .side { position: sticky; top: 24px; align-self: start; }
    .side .label { font-family: var(--sans); font-size: 10.5px; letter-spacing: 0.22em; text-transform: uppercase; color: var(--accent); margin-bottom: 14px; }
    .side .block { margin-bottom: 36px; }
    .side .item { padding: 14px 0; border-top: 1px solid var(--rule); cursor: pointer; }
    .side .item:last-child { border-bottom: 1px solid var(--rule); }
    .side .item:hover .ttl { color: var(--accent-ink); }
    .side .item .ttl { font-family: var(--serif); font-size: 17px; line-height: 1.25; color: var(--ink); margin: 0 0 4px; }
    .side .item .juris { font-family: var(--sans); font-size: 10.5px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--ink-3); }
    .side .item .juris .st { color: var(--accent); margin-left: 8px; }
    .side .item.article-item .cat { font-family: var(--sans); font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--accent); margin-bottom: 4px; }
    .side .item.article-item .by { font-family: var(--sans); font-size: 11px; color: var(--ink-3); }
    .side .progress { font-family: var(--mono); font-size: 12px; color: var(--ink-3); padding: 10px 0; border-top: 1px solid var(--rule); border-bottom: 1px solid var(--rule); display: flex; justify-content: space-between; }

    /* author bio */
    .bio { padding: 48px 0; border-top: 1px solid var(--ink); border-bottom: 1px solid var(--rule); display: grid; grid-template-columns: 80px minmax(0, 1fr); gap: 28px; max-width: 920px; margin: 0 auto; }
    .bio .avatar { width: 80px; height: 80px; background: var(--rule-soft); border: 1px solid var(--rule); display: flex; align-items: center; justify-content: center; font-family: var(--serif); font-size: 30px; color: var(--accent); }
    .bio .label { font-family: var(--sans); font-size: 10.5px; letter-spacing: 0.22em; text-transform: uppercase; color: var(--accent); margin-bottom: 8px; }
    .bio h3 { font-family: var(--serif); font-weight: 400; font-size: 26px; margin: 0 0 10px; }
    .bio p { font-family: var(--serif); font-size: 17px; line-height: 1.55; color: var(--ink-2); margin: 0 0 8px; }
    .bio .more { font-family: var(--sans); font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--accent); cursor: pointer; }

    /* disclaimer */
    .disclaimer { padding: 28px 0 64px; max-width: 920px; margin: 0 auto; font-family: var(--sans); font-size: 12px; line-height: 1.6; color: var(--ink-3); letter-spacing: 0.02em; text-align: center; }
    .disclaimer .label { font-family: var(--sans); font-size: 10.5px; letter-spacing: 0.22em; text-transform: uppercase; color: var(--ink-3); margin-bottom: 8px; }

    /* footer */
    footer { padding: 48px 0; font-family: var(--sans); font-size: 12px; color: var(--ink-3); display: flex; justify-content: space-between; border-top: 2px solid var(--ink); }
    footer a:hover { color: var(--accent); }
    footer .links { display: flex; gap: 28px; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" src="src/Article.jsx"></script>
</body>
</html>
